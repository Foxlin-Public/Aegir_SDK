name: Hosted Aegir MCP

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: aegir-sdk-mcp-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Hosted MCP
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Validate MCP package
        working-directory: ./mcp
        run: npm test

  deploy:
    name: Deploy Hosted MCP
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    permissions:
      contents: read
    env:
      REMOTE_HOST: ${{ secrets.AEGIR_SDK_SERVER_HOST }}
      REMOTE_USER: ${{ secrets.AEGIR_SDK_SERVER_USERNAME }}
      REMOTE_PASSWORD: ${{ secrets.AEGIR_SDK_SERVER_PASSWORD }}
      REMOTE_PATH: ${{ secrets.AEGIR_SDK_REMOTE_PATH }}
      AEGIR_BASE_URL: ${{ secrets.AEGIR_BASE_URL }}
      AEGIR_CONFIG_KEY: ${{ secrets.AEGIR_CONFIG_KEY }}
      AEGIR_DEVELOPER_KEY: ${{ secrets.AEGIR_DEVELOPER_KEY }}
      AEGIR_MCP_BEARER_TOKEN: ${{ secrets.AEGIR_MCP_BEARER_TOKEN }}
      AEGIR_MCP_HOST: ${{ secrets.AEGIR_MCP_HOST }}
      AEGIR_MCP_PORT: ${{ secrets.AEGIR_MCP_PORT }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Set default deployment path
        run: |
          if [ -z "${REMOTE_PATH}" ]; then
            echo "REMOTE_PATH=/home/${REMOTE_USER}/Aegir_SDK" >> "$GITHUB_ENV"
          fi

      - name: Set default hosted MCP binding
        run: |
          if [ -z "${AEGIR_MCP_HOST}" ]; then
            echo "AEGIR_MCP_HOST=0.0.0.0" >> "$GITHUB_ENV"
          fi
          if [ -z "${AEGIR_MCP_PORT}" ]; then
            echo "AEGIR_MCP_PORT=8788" >> "$GITHUB_ENV"
          fi

      - name: Install SSH helper
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: Trust remote host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${REMOTE_HOST}" >> ~/.ssh/known_hosts

      - name: Create deployment archive
        run: |
          archive_path="${RUNNER_TEMP}/aegir_sdk.tgz"
          tar \
            --exclude=".git" \
            --exclude="node_modules" \
            --exclude="packages/java/target" \
            -czf "${archive_path}" .
          echo "ARCHIVE_PATH=${archive_path}" >> "$GITHUB_ENV"

      - name: Upload repository contents
        run: |
          sshpass -p "${REMOTE_PASSWORD}" scp "${ARCHIVE_PATH}" "${REMOTE_USER}@${REMOTE_HOST}:/tmp/aegir_sdk.tgz"

      - name: Deploy hosted MCP on server
        run: |
          sshpass -p "${REMOTE_PASSWORD}" ssh "${REMOTE_USER}@${REMOTE_HOST}" "
            set -e
            mkdir -p '${REMOTE_PATH}'
            tar -xzf /tmp/aegir_sdk.tgz -C '${REMOTE_PATH}'
            printf '%s\n' \
              'AEGIR_BASE_URL=${AEGIR_BASE_URL}' \
              'AEGIR_CONFIG_KEY=${AEGIR_CONFIG_KEY}' \
              'AEGIR_DEVELOPER_KEY=${AEGIR_DEVELOPER_KEY}' \
              'AEGIR_MCP_HOST=${AEGIR_MCP_HOST}' \
              'AEGIR_MCP_PORT=${AEGIR_MCP_PORT}' \
              'AEGIR_MCP_BEARER_TOKEN=${AEGIR_MCP_BEARER_TOKEN}' \
              > '${REMOTE_PATH}/mcp/.env.hosted'
            chmod +x '${REMOTE_PATH}/scripts/deploy-hosted-mcp.sh'
            printf '%s\n' '${REMOTE_PASSWORD}' | sudo -SE bash '${REMOTE_PATH}/scripts/deploy-hosted-mcp.sh'
          "
