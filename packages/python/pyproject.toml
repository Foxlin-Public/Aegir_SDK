[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[project]
name = "foxlin-aegir-security"
version = "0.1.0-Beta.1"
description = "Aegir Security Beta-1 Python client."
readme = "README.md"
license = "MIT"
requires-python = ">=3.11"
authors = [
  { name = "Foxlin Industries" }
]
keywords = ["aegir", "security", "identity", "foxlin"]
classifiers = [
  "License :: OSI Approved :: MIT License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3 :: Only"
]

[tool.setuptools.packages.find]
include = ["foxlin_aegir_security*"]
